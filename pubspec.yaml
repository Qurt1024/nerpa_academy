name: nerpa_academy
description: "A mobile learning app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.8 
  flutter_svg: ^2.2.3 
  cached_network_image: ^3.4.1 
  flutter_animate: ^4.5.2 
  gap: ^3.0.1 
  bloc: ^9.2.0 
  flutter_bloc: ^9.1.1 

 
  firebase_core: ^4.4.0 
  firebase_auth: ^6.1.4 
  cloud_firestore: ^6.1.2 
  firebase_storage: ^13.0.6
  google_sign_in: ^7.2.0 

  go_router: ^17.1.0

  flutter_form_builder: ^10.3.0 
  form_builder_validators: ^11.3.0 

  
  equatable: ^2.0.8
  intl: ^0.20.2 
  flutter_dotenv: ^6.0.0 
  shared_preferences: ^2.5.4 
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2 
  image_picker: ^1.2.1 


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/svg/
    - .env
